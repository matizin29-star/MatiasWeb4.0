name: CI — Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://matiasweb.dev' }}

      - name: Verify output
        run: |
          if [ ! -f "out/index.html" ]; then
            echo "❌ out/index.html not found!"
            exit 1
          fi
          if [ ! -f "out/_redirects" ]; then
            echo "⚠️ _redirects not found"
          fi
          echo "✅ Build output verified:"
          du -sh out/
          find out/ -type f | wc -l | xargs -I{} echo "  {} files total"
